<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SIRT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <?!= include('Styles') ?>
  <script>var CURRENT_PAGE = 'Dashboard';</script>
</head>
<body>
  <div id="app">
    <?!= include('Layout') ?>

    <!-- Main Content -->
    <div class="content">
      <div class="header">
        <h1 id="pageTitle">Dashboard</h1>
        <div id="userInfo">
          <span id="userName"></span>
        </div>
      </div>

      <div class="container-fluid">
        <!-- Dashboard Stats -->
        <div class="row mb-4" id="dashboardStats">
          <!-- Stats cards will be populated here -->
        </div>

        <!-- Charts -->
        <div class="row mb-4">
          <div class="col-md-6">
            <div class="stat-card">
              <h5>Iuran Status</h5>
              <canvas id="iuranChart"></canvas>
            </div>
          </div>
          <div class="col-md-6">
            <div class="stat-card">
              <h5>Keuangan Overview</h5>
              <canvas id="keuanganChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Recent Activities -->
        <div class="row">
          <div class="col-12">
            <div class="stat-card">
              <h5>Recent Activities</h5>
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th>Timestamp</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Details</th>
                  </tr>
                </thead>
                <tbody id="activityTable">
                  <!-- Activities will be populated here -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <?!= include('Scripts') ?>
  <script>
    let iuranChart, keuanganChart;

    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', function() {
      loadDashboardData();
    });

    function loadDashboardData() {
      google.script.run.withSuccessHandler(function(data) {
        if (data.success) {
          renderStats(data.stats);
          renderCharts(data.charts);
          renderActivities(data.activities);
        }
      }).getDashboardData();
    }

    function renderStats(stats) {
      const statsHtml = stats.map(stat => `
        <div class="col-md-3 mb-3">
          <div class="stat-card">
            <div class="stat-card-value">${stat.value}</div>
            <div class="stat-card-label">${stat.label}</div>
          </div>
        </div>
      `).join('');
      document.getElementById('dashboardStats').innerHTML = statsHtml;
    }

    function renderCharts(data) {
      // Iuran Chart
      if (iuranChart) iuranChart.destroy();
      iuranChart = new Chart(document.getElementById('iuranChart'), {
        type: 'doughnut',
        data: {
          labels: data.iuran.labels,
          datasets: [{
            data: data.iuran.data,
            backgroundColor: ['#10b981', '#ef4444', '#f59e0b']
          }]
        },
        options: { responsive: true, maintainAspectRatio: true }
      });

      // Keuangan Chart
      if (keuanganChart) keuanganChart.destroy();
      keuanganChart = new Chart(document.getElementById('keuanganChart'), {
        type: 'bar',
        data: {
          labels: data.keuangan.labels,
          datasets: [{
            label: 'Income',
            data: data.keuangan.income,
            backgroundColor: '#10b981'
          }, {
            label: 'Expense',
            data: data.keuangan.expense,
            backgroundColor: '#ef4444'
          }]
        },
        options: { responsive: true, maintainAspectRatio: true }
      });
    }

    function renderActivities(activities) {
      const html = activities.map(act => `
        <tr>
          <td>${Utils.formatDate(act.timestamp)}</td>
          <td>${act.user}</td>
          <td><span class="badge badge-primary">${act.action}</span></td>
          <td>${act.details}</td>
        </tr>
      `).join('');
      document.getElementById('activityTable').innerHTML = html;
    }
  </script>
</body>
</html>
