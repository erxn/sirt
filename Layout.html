<!-- Top Header (Mobile) -->
<div class="top-header d-md-none">
  <button class="btn btn-link" onclick="toggleSidebar()">
    <i class="bi bi-list fs-4"></i>
  </button>
  <span class="fw-bold">SIRT</span>
  <div></div>
</div>

<script>
var BASE_URL = '';

// Get base URL from server
google.script.run.withSuccessHandler(function(url) {
  BASE_URL = url;
  initNavigation();
}).getWebAppUrl();

function initNavigation() {
  // Set up navigation links
  document.querySelectorAll('.sidebar-nav .nav-link').forEach(function(link) {
    var page = link.getAttribute('data-page');
    link.href = BASE_URL + '?page=' + page;
    link.setAttribute('target', '_top');
    
    // Highlight active menu based on CURRENT_PAGE variable set by each page
    if (typeof CURRENT_PAGE !== 'undefined' && page === CURRENT_PAGE) {
      link.classList.add('active');
    }
  });
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('show');
}

function handleLogout() {
  if (confirm('Apakah Anda yakin ingin logout?')) {
    google.script.run.withSuccessHandler(function() {
      window.top.location.href = BASE_URL;
    }).logout();
  }
}

// Load user info
google.script.run.withSuccessHandler(function(user) {
  if (user) {
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userRole').textContent = user.role_name || user.role_id;
  }
}).getCurrentUserInfo();
</script>
